<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <header>
        <img src="assets/img/imagen_generica.png" alt="Logo de la empresa" class="logo">
        <h1>Todo en blanco</h1>

        <nav>
            <ul>
                <li><a href="index.html" class="botonNavegacion">Inicio</a></li>

                <li><a href="contacto.html" class="botonNavegacion">Contáctanos</a></li>
                <li><a href="trabajaConNosotros.html" class="botonNavegacion">Trabaja con nosotros</a></li>
                <li><a href="login.html" class="botonNavegacion">Ingresar al sistema</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="seccionLogin">
            <h2>Ingreso al sistema</h2>
            <form action="administrador.html" method="post">
                <fieldset>
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" name="cedula" autocomplete="username" pattern="[1-9][0-9]{7}"
                        title="Ingrese exactamente 8 dígitos sin puntos ni guiones" inputmode="numeric" maxlength="8"
                        required>

                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" name="clave" autocomplete="current-password" minlength="12"
                        required>

                </fieldset>

                <button type="submit">Iniciar Sesión</button>
            </form>
        </section>
    </main>

    <footer>

        </address>
        <p>© 2026 Todo en Blanco</p>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <header class="barraNavegacion">
        <img src="assets/img/imagen_generica.png" alt="Logo de la empresa" class="logo">
        <h1>Todo en blanco</h1>

        <nav>
            <button class="btnMenu" id="btnMenu" type="button">
                <img src="assets/img/list.svg" alt="Menú" class="iconoMenu">
            </button>

            <button class="btnCerrarMenu" id="btnCerrarMenu" type="button">
                <img src="assets/img/x.svg" alt="Cerrar Menú" class="iconoMenu">
            </button>

            <ul class="listaNavegacion">
                <li><a href="index.html" class="btnNavegacion">Inicio</a></li>
                <li><a href="sobreNosotros.html" class="btnNavegacion">Sobre Nosotros</a></li>
                <li><a href="contacto.html" class="btnNavegacion">Contáctanos</a></li>
                <li><a href="trabajaConNosotros.html" class="btnNavegacion">Trabaja con nosotros</a></li>
                <li><a href="login.html" class="btnNavegacion">Ingresar al sistema</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="seccionLogin">
            <h2>Ingreso al sistema</h2>
            <form action="administrador.html" method="post">
                <fieldset>
                    <legend>Inicio de sesión</legend>
                    <div class="cajaEntradaDeDatos">
                        <label for="cedula">Cédula</label>
                        <input type="text" id="cedula" name="cedula" autocomplete="username" pattern="[1-9][0-9]{7}"
                            title="Ingrese exactamente 8 dígitos sin puntos ni guiones" inputmode="numeric"
                            maxlength="8" required>
                    </div>
                    <div class="cajaEntradaDeDatos">
                        <label for="clave">Contraseña</label>
                        <input type="password" id="clave" name="clave" autocomplete="current-password" minlength="12"
                            required>
                    </div>
                </fieldset>

                <button type="submit">Iniciar Sesión</button>
            </form>
        </section>
    </main>
    <a href="#inicio" class="btnSubir">
        <i class="bi bi-caret-up-fill"></i>
    </a>
    <footer>
        <address>
            <a href="http://instagram.com">@todoenblanco</a>
            <a href="tel:+4567 7373">+4567 7373</a>
            <a href="tel:098318897">098 318 897</a>
            <a href="mailto:todoenblanco@gmail.com.">todoenblanco@gmail.com.</a>
        </address>
        <p>© 2026 Todo en Blanco</p>
    </footer>
    <script src="assets/js/barraNavegacion.js"></script>
</body>

</html>
